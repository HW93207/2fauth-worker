name = "2fauth-worker"
# 1. 更新主入口路径，指向 backend 目录
main = "backend/src/app/index.ts" 
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
# 2. 更新前端静态资产路径
directory = "frontend/dist" 
not_found_handling = "single-page-application"
run_worker_first = true

[build]
# 3. 更新前端构建命令的路径
command = "npm run build --prefix frontend" 

[[d1_databases]]
binding = "DB"
database_name = "2fauth-db"
database_id = "9e591736-5dbb-4f09-8769-0270d7257731"

[triggers]
crons = ["0 2 * * *"]

[env.dev]
[[env.dev.d1_databases]]
binding = "DB"
database_name = "2fauth-db-dev"
database_id = "9e591736-5dbb-4f09-8769-0270d7257731"